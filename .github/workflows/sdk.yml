name: Generate PHP SDK

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

jobs:
  generate-sdk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cleanup old client
        run: rm -rf src/Api src/Model docs

      - name: Generate PHP SDK
        uses: openapi-generators/openapitools-generator-action@v1
        with:
          generator: php-nextgen
          config-file: php-generator-config.yml
          openapi-url: https://api.simply.com/2/doc.json
          command-args: -o . --global-property=apiDocs=false,modelDocs=false,apiTests=false,modelTests=false

      - name: Commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update API
